name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system libs for headless OpenCV
        run: sudo apt-get update && sudo apt-get install -y libgl1

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check core app tests scripts

      - name: Check formatting with black
        run: black --check core app tests scripts

      - name: Run core detection engine tests
        run: pytest --cov=core --cov-report=term-missing
